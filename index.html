<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reels - Autoplay MP4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#14b8a6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-transparent m-0 p-0 overflow-hidden">

    <section class="w-full max-w-sm mx-auto relative pt-2 pb-2">

        <div class="flex items-center justify-between mb-4 relative z-10 px-1">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    </span>
                    <p class="text-[7px] tracking-[0.25em] text-gray-500 uppercase font-semibold">The Video</p>
                </div>
                <h2 class="text-xl font-black tracking-tight text-gray-900 leading-none">OFFLINE <span class="text-brandGreen">WORKSHOP</span></h2>
            </div>
            
            <a href="https://www.youtube.com/@anestmotion" target="_blank" class="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-full px-3 py-1.5 transition hover:bg-gray-100">
                <svg class="w-3 h-3 text-gray-700" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                <span class="text-[7px] text-gray-700 font-bold">@anestmotion</span>
            </a>
        </div>

        <div class="flex flex-col gap-4 relative z-10 w-full px-1">

            <div class="relative rounded-[22px] overflow-hidden shadow-lg w-full aspect-video group bg-black">
                
                <video 
                    autoplay 
                    muted 
                    loop 
                    playsinline 
                    class="w-full h-full object-cover scale-[1.02] group-hover:scale-[1.06] transition-transform duration-700">
                    <source src="https://www.image2url.com/r2/default/videos/1782907934977-960c0600-4913-4cc1-a470-e59636896aac.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-black/30 pointer-events-none"></div>

                <div class="absolute top-3 left-3 flex items-center gap-1.5 z-10 pointer-events-none">
                    <div class="bg-brandGreen/90 backdrop-blur-sm text-white text-[6.5px] font-black px-2 py-0.5 rounded-full tracking-wider uppercase">✦ FEATURED</div>
                </div>

                <div class="absolute inset-0 flex items-center justify-center z-10 opacity-70 group-hover:opacity-0 transition-opacity duration-300 pointer-events-none">
                    <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center shadow-lg">
                        <svg class="w-4 h-4 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                </div>

                <div class="absolute bottom-0 left-0 right-0 p-4 z-10 pointer-events-none">
                    <p class="text-white font-black text-sm mb-1 leading-tight">Photoacademy Workshop</p>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1">
                            <svg class="w-3 h-3 text-white/80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            <span class="text-[9px] text-white/80 font-medium">Now Playing</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="relative z-10 mt-6 flex items-center justify-between px-1">
            <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-gray-200 mr-3"></div>
            <a href="https://www.youtube.com/@anestmotion" target="_blank" class="flex items-center gap-1.5 text-[7.5px] text-gray-400 hover:text-gray-800 transition font-bold tracking-wider uppercase">
                See All Videos
                <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
            </a>
        </div>

    </section>

</body>
</html>
